<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Myle Community</title>
  <link href="{{ url_for('static', filename='vendor/bootstrap-5.3.3/css/bootstrap.min.css') }}" rel="stylesheet" />
  <link href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.min.css') }}" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
      border: none;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-brand {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 16px 16px 0 0;
      padding: 2rem;
      text-align: center;
      color: white;
    }
    .login-brand .brand-icon {
      width: 64px;
      height: 64px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.75rem;
    }
    .form-control:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 0.2rem rgba(99,102,241,0.25);
    }
    .btn-login {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.65rem;
      border-radius: 8px;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; color: white; }
    .input-group-text { background: #f8f9fa; border-right: none; }
    .form-control { border-left: none; }
  </style>
</head>
<body>

<div class="login-card card">
  <!-- Brand header -->
  <div class="login-brand">
    <div class="brand-icon">
      <i class="bi bi-diagram-3-fill"></i>
    </div>
    <h4 class="fw-bold mb-1">Myle Community</h4>
    <p class="mb-0 opacity-75 small">Sign in to your account</p>
  </div>

  <!-- Form body -->
  <div class="card-body p-4">
    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} alert-dismissible fade show py-2 small" role="alert">
            {{ msg }}
            <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" novalidate>
      <div class="mb-3">
        <label class="form-label fw-semibold small">FBO ID</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
          <input type="text" name="fbo_id" class="form-control" autocomplete="username"
                 placeholder="Your FBO ID" required autofocus>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold small">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" id="passwordInput"
                 class="form-control" placeholder="Enter password" required>
          <button type="button" class="btn btn-outline-secondary border-start-0"
                  onclick="togglePassword()" tabindex="-1">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <!-- Remember Me + Forgot Password -->
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="form-check mb-0">
          <input class="form-check-input" type="checkbox" name="remember_me" id="rememberMe" value="1" checked>
          <label class="form-check-label small text-muted" for="rememberMe">
            Remember me
          </label>
        </div>
        <a href="{{ url_for('forgot_password') }}" class="small text-decoration-none" style="color:#6366f1;">
          Forgot password?
        </a>
      </div>

      <button type="submit" class="btn btn-login w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
  </div>

  <div class="card-footer text-center py-3 bg-light rounded-bottom">
    <small class="text-muted">
      New team member?
      <a href="{{ url_for('register') }}" class="fw-semibold text-decoration-none" style="color:#6366f1;">
        Register here &rarr;
      </a>
    </small>
    <div class="mt-1">
      <small class="text-muted opacity-50">
        <i class="bi bi-shield-lock-fill me-1"></i>Secure internal access
      </small>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='vendor/bootstrap-5.3.3/js/bootstrap.bundle.min.js') }}"></script>
<script>
  function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  }
</script>
</body>
</html>
