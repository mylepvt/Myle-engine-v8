<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} — Myle</title>
  <link href="{{ url_for('static', filename='vendor/bootstrap-5.3.3/css/bootstrap.min.css') }}" rel="stylesheet" />
  <link href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.min.css') }}" rel="stylesheet" />
  <style>
    body { background: linear-gradient(180deg, #f0f4ff 0%, #e8eeff 20%, #f8fafc 100%); min-height: 100vh; }
    .watch-header { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: #fff; border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.25); }
    .watch-header h1 { font-size: 1.15rem; font-weight: 700; margin: 0 0 0.25rem 0; }
    .watch-header p { font-size: 0.85rem; opacity: 0.95; margin: 0; }
    .video-card { border: none; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
    .video-card .card-body { background: #fff; padding: 1rem 1.25rem; }
    .thanks-msg { font-size: 0.9rem; color: #64748b; text-align: center; margin-top: 1rem; padding: 0.75rem; background: rgba(255,255,255,0.8); border-radius: 12px; }
  </style>
</head>
<body class="p-3">
  <div class="container" style="max-width: 720px;">
    <div class="watch-header">
      <h1><i class="bi bi-play-circle-fill me-2"></i>{{ title }}</h1>
      <p>Watch this video with focus.</p>
    </div>
    <div class="video-card card">
      <div class="ratio ratio-16x9">
        <iframe src="{{ embed_url }}" title="{{ title }}" allow="accelerometer; autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="card-body">
        <h6 class="mb-0 text-dark">{{ title }}</h6>
      </div>
    </div>
    <p class="thanks-msg">Finished watching? Message your coach to confirm.</p>
  </div>
</body>
</html>
