<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — iOS viewport-fit covers notch / Dynamic Island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Identity -->
    <title>Myle</title>
    <meta name="description" content="Myle — your sales pipeline, follow-ups, and team leads in one place." />
    <meta name="application-name" content="Myle" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192.png" sizes="192x192" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS PWA shell -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Myle" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Myle" />
    <meta property="og:description" content="Your sales pipeline, follow-ups, and team leads in one place." />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Myle" />

    <!-- System UI fonts (SF / Roboto / Segoe) — iOS/Android native feel -->

    <!-- Prevent flash — iOS dark system background -->
    <style>html { background: #000000; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
