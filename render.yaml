# Render Blueprint — Postgres + Redis + CRM API + Backend API + Frontend.
# Docs: https://render.com/docs/blueprint-spec
#
# Apply: Dashboard → New → Blueprint → connect this repo → apply.
#
# After first deploy, set these manually in Render dashboard:
#   myle-vl2-api   → BACKEND_CORS_ORIGINS = https://<your-frontend-url>
#   myle-vl2-api   → CRM_API_URL          = https://myle-crm-api.onrender.com
#   myle-crm-api   → (no extra manual vars needed — all wired below)

services:
  # ── Redis ────────────────────────────────────────────────────────────────
  - type: redis
    name: myle-vl2-redis
    plan: free
    region: singapore
    ipAllowList: []           # internal only

  # ── CRM Fastify microservice ─────────────────────────────────────────────
  - type: web
    name: myle-crm-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./apps/crm-api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: "postgresql://myle_db_v2_user:WTmYywzxEuVT2v30OKWZdgkZg0obtPDy@dpg-d7chigpj2pic73btjldg-a.singapore-postgres.render.com/myle_db_v2"
      - key: REDIS_URL
        fromService:
          name: myle-vl2-redis
          type: redis
          property: connectionString
      - key: CRM_INTERNAL_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CRM_API_PORT
        value: "4000"

  # ── FastAPI backend (gateway + auth) ─────────────────────────────────────
  - type: web
    name: myle-vl2-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: "postgresql+asyncpg://myle_db_v2_user:WTmYywzxEuVT2v30OKWZdgkZg0obtPDy@dpg-d7chigpj2pic73btjldg-a.singapore-postgres.render.com/myle_db_v2"
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: AUTH_DEV_LOGIN_ENABLED
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: lax
      - key: BACKEND_CORS_ORIGINS
        sync: false               # set manually after deploy
      - key: CRM_API_URL
        sync: false               # set to https://myle-crm-api.onrender.com after deploy
      - key: CRM_INTERNAL_SECRET
        fromService:
          name: myle-crm-api
          type: web
          envVarKey: CRM_INTERNAL_SECRET
      - key: WEB_CONCURRENCY
        value: "1"
      - key: RENDER
        value: "true"

  # ── React frontend (nginx) ────────────────────────────────────────────────
  - type: web
    name: myle-vl2-frontend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./frontend/Dockerfile.prod
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        sync: false               # set to https://myle-vl2-api.onrender.com after deploy
