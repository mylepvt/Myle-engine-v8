# Render Blueprint — Postgres + single Web Service (root Dockerfile: API + Vite SPA same origin).
# Docs: https://render.com/docs/blueprint-spec
#
# Apply: Dashboard → New → Blueprint → connect this repo → apply.
# After first deploy: set BACKEND_CORS_ORIGINS to your service URL exactly, e.g.
#   https://myle-vl2-api.onrender.com
# (same URL users open in the browser; no trailing slash.)
#
# Monolith reference (Flask + gunicorn sync): see backend/legacy/myle_dashboard_main3/render.monolith.yaml
# — vl2 uses Docker + uvicorn ASGI; optional gunicorn+UvicornWorker via backend/gunicorn.conf.py + asgi:app.

databases:
  - name: myle-vl2-db
    databaseName: myle
    user: myle
    plan: free

services:
  - type: web
    name: myle-vl2-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: myle-vl2-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: AUTH_DEV_LOGIN_ENABLED
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: lax
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: FEATURE_INTELLIGENCE
        value: "false"
      # Render injects PORT (mapped in Dockerfile CMD). Optional: raise after RAM upgrade.
      - key: WEB_CONCURRENCY
        value: "1"
      # Set by Render on managed services — used by gunicorn.conf.py if you switch start command.
      - key: RENDER
        value: "true"
