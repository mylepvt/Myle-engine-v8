<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – Myle Community</title>
  <link href="{{ url_for('static', filename='vendor/bootstrap-5.3.3/css/bootstrap.min.css') }}" rel="stylesheet" />
  <link href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.min.css') }}" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      width: 100%; max-width: 420px;
      border-radius: 16px; border: none;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .card-brand {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 16px 16px 0 0;
      padding: 1.8rem 2rem; text-align: center; color: white;
    }
    .btn-primary-grad {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; color: white; font-weight: 600;
      padding: 0.65rem; border-radius: 8px;
    }
    .btn-primary-grad:hover { opacity: 0.9; color: white; }
    .form-control:focus { border-color: #6366f1; box-shadow: 0 0 0 0.2rem rgba(99,102,241,0.25); }
    .input-group-text { background: #f8f9fa; border-right: none; }
    .form-control { border-left: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-brand">
    <div style="width:56px;height:56px;background:rgba(255,255,255,0.15);border-radius:50%;
                display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;">
      <i class="bi bi-lock-fill"></i>
    </div>
    <h5 class="fw-bold mb-0">Set New Password</h5>
    <p class="mb-0 opacity-75 small">Choose a strong password</p>
  </div>

  <div class="card-body p-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} alert-dismissible fade show py-2 small" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="mb-3">
        <label class="form-label fw-semibold small">New Password <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" id="passwordInput"
                 class="form-control" placeholder="At least 6 characters" required>
          <button type="button" class="btn btn-outline-secondary border-start-0"
                  onclick="togglePwd('passwordInput','eye1')" tabindex="-1">
            <i class="bi bi-eye" id="eye1"></i>
          </button>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Confirm Password <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill text-muted"></i></span>
          <input type="password" name="confirm_password" id="confirmInput"
                 class="form-control" placeholder="Repeat new password" required>
          <button type="button" class="btn btn-outline-secondary border-start-0"
                  onclick="togglePwd('confirmInput','eye2')" tabindex="-1">
            <i class="bi bi-eye" id="eye2"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-grad w-100">
        <i class="bi bi-check-circle-fill me-2"></i>Update Password
      </button>
    </form>
  </div>

  <div class="card-footer text-center py-3 bg-light rounded-bottom">
    <small class="text-muted">
      <a href="{{ url_for('login') }}" class="fw-semibold text-decoration-none" style="color:#6366f1;">
        <i class="bi bi-arrow-left me-1"></i>Back to Login
      </a>
    </small>
  </div>
</div>
<script src="{{ url_for('static', filename='vendor/bootstrap-5.3.3/js/bootstrap.bundle.min.js') }}"></script>
<script>
  function togglePwd(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  }
</script>
</body>
</html>
