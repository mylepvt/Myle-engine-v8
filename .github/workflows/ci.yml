name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Full backend/requirements.txt — router imports (e.g. certificate → reportlab) must resolve in CI
          python -m pip install -r backend/requirements.txt
          python -m pip install "pytest>=8.0.0" "httpx>=0.27.0" "anyio[trio]" "pip-audit>=2.7"

      - name: Pytest
        run: python -m pytest tests/ -q

      - name: pip-audit (backend/requirements.txt)
        run: python -m pip_audit -r backend/requirements.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: npm audit (high severity+)
        run: npm audit --audit-level=high

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (Playwright)
        run: npm run test:e2e
