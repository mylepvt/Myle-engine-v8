name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Full backend/requirements.txt — router imports (e.g. certificate → reportlab) must resolve in CI
          python -m pip install -r backend/requirements.txt
          python -m pip install "pytest>=8.0.0" "httpx>=0.27.0" "anyio[trio]" "pip-audit>=2.7"

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U test_user -d test_db && exit 0
            sleep 2
          done
          echo "PostgreSQL is not ready"
          exit 1

      - name: Run database migrations
        env:
          DATABASE_URL: "postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db"
        run: cd backend && alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: "postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db"
        run: python -m pytest tests/ -q

      - name: pip-audit (backend/requirements.txt)
        run: python -m pip_audit -r backend/requirements.txt

      - name: Start backend for perf check
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-perf-test-key"
        run: |
          cd backend
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/health && break || sleep 1
          done

      - name: Perf check (p95 < 300ms)
        run: python scripts/perf_check.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build (same-origin API for Playwright route mocks)
        env:
          VITE_API_URL: ""
        run: npm run build

      - name: npm audit (high severity+)
        run: npm audit --audit-level=high

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (Playwright)
        run: npm run test:e2e
