# One-way mirror: Mylecommunity/Myle-community (canonical) -> mylepvt/New-Myle-Community (optional copy).
# If you only use the canonical repo, leave MYLEPVT_SYNC_PAT unset — job skips (green), no confusion.
# To enable mirror push (e.g. Render tied to mylepvt):
# 1. PAT with push to mylepvt/New-Myle-Community
# 2. Canonical repo → Settings → Secrets → Actions → MYLEPVT_SYNC_PAT
# 3. Adjust MYLEPVT_TARGET if the mirror path differs.

name: Sync to mylepvt mirror

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sync-mylepvt
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # Avoid running on forks (they won't have the secret anyway)
    if: github.event.repository.fork == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mylepvt
        env:
          PAT: ${{ secrets.MYLEPVT_SYNC_PAT }}
          MYLEPVT_TARGET: mylepvt/New-Myle-Community
        run: |
          set -euo pipefail
          if [ -z "${PAT}" ]; then
            echo "::notice::MYLEPVT_SYNC_PAT not set — skipping mirror push (use Mylecommunity/Myle-community as single source of truth)."
            exit 0
          fi
          # Remove the GitHub Actions credential helper so our PAT is used instead
          git config --unset-all http.https://github.com/.extraheader || true
          git remote add mylepvt "https://x-access-token:${PAT}@github.com/${MYLEPVT_TARGET}.git"
          git push mylepvt "HEAD:refs/heads/main"
