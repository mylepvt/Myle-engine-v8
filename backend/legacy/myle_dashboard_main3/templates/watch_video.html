<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if title %}{{ title }}{% else %}Video{% endif %} — Myle</title>
  <link href="{{ url_for('static', filename='vendor/bootstrap-5.3.3/css/bootstrap.min.css') }}" rel="stylesheet" />
  <link href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.min.css') }}" rel="stylesheet" />
</head>
<body class="bg-light min-vh-100 p-3">
  <div class="container" style="max-width: 720px;">
    {% if error %}
    <div class="card border-0 shadow-sm text-center">
      <div class="card-body p-4">
        <i class="bi bi-link-45deg text-muted" style="font-size: 3rem;"></i>
        <h5 class="mt-3">{{ error }}</h5>
        <p class="text-muted small mb-0">
          This share link is invalid, expired, or the video is not configured.
        </p>
      </div>
    </div>
    {% else %}
    {% if embed_url %}
    <div class="card border-0 shadow-sm overflow-hidden mb-3">
      <div class="ratio ratio-16x9">
        <iframe src="{{ embed_url }}" title="{{ title }}" allow="accelerometer; autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="card-body py-2">
        <h6 class="mb-0">{{ title }}</h6>
      </div>
    </div>
    <p class="text-muted small text-center mb-0">Thanks for watching. Your response has been recorded.</p>
    {% else %}
    <div class="card border-0 shadow-sm text-center">
      <div class="card-body p-4">
        <i class="bi bi-play-circle text-primary" style="font-size: 3rem;"></i>
        <h5 class="mt-3">{{ title }}</h5>
        <p class="text-muted small mb-0">Thanks for watching. Your response has been recorded.</p>
      </div>
    </div>
    {% endif %}
    {% endif %}
  </div>
</body>
</html>
