name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Full backend/requirements.txt — router imports (e.g. certificate → reportlab) must resolve in CI
          python -m pip install -r backend/requirements.txt
          python -m pip install "pytest>=8.0.0" "httpx>=0.27.0" "anyio[trio]" "pip-audit>=2.7"

      - name: Install PostgreSQL client (pg_isready)
        run: sudo apt-get update -y && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U test_user -d test_db && exit 0
            sleep 2
          done
          echo "PostgreSQL is not ready"
          exit 1

      - name: Run database migrations
        env:
          DATABASE_URL: "postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db"
        run: cd backend && alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: "postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db"
        run: python -m pytest tests/ -q

      - name: pip-audit (backend/requirements.txt)
        run: python -m pip_audit -r backend/requirements.txt

      - name: Start backend for perf check
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-perf-test-key"
        run: |
          cd backend
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          ok=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              ok=1
              break
            fi
            sleep 1
          done
          if [ "$ok" != 1 ]; then
            echo "Backend failed to become healthy on /health"
            exit 1
          fi

      - name: Perf check (p95 < 300ms)
        run: python scripts/perf_check.py

  # Lead Execution CRM (Fastify + Prisma) — integration tests require DB + env (never skip in CI)
  crm-api:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://crm_ci:crm_ci_pass@localhost:5432/crm_ci?schema=public
      CRM_INTEGRATION_DATABASE_URL: postgresql://crm_ci:crm_ci_pass@localhost:5432/crm_ci?schema=public
      CRM_REDIS_URL: redis://127.0.0.1:6379
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: crm_ci
          POSTGRES_PASSWORD: crm_ci_pass
          POSTGRES_DB: crm_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm_ci -d crm_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (workspaces)
        run: npm ci --no-audit --no-fund

      - name: Prisma migrate + generate
        working-directory: apps/crm-api
        run: |
          npx prisma migrate deploy
          npx prisma generate

      - name: Build crm-api
        working-directory: apps/crm-api
        run: npm run build

      - name: Test crm-api (unit + integration — DB env set so Vitest does not skip)
        working-directory: apps/crm-api
        run: npm run test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build (same-origin API for Playwright route mocks)
        env:
          VITE_API_URL: ""
        run: npm run build

      - name: npm audit (high severity+)
        run: npm audit --audit-level=high

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (Playwright)
        run: npm run test:e2e
