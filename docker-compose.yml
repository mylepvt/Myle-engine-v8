# From repo root: docker compose up --build
# Frontend: http://localhost:5173  |  API docs: http://localhost:8000/docs  |  CRM: http://localhost:4000
# Migrations run on container start (alembic upgrade head / prisma migrate deploy).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: myle
      POSTGRES_PASSWORD: myle
      POSTGRES_DB: myle
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myle -d myle"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  crm-api:
    build:
      context: ./apps/crm-api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://myle:myle@db:5432/myle"
      REDIS_URL: "redis://redis:6379"
      CRM_API_PORT: "4000"
      CRM_INTERNAL_SECRET: "dev-internal-secret-change-in-prod"
      NODE_ENV: "development"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      BACKEND_CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      DATABASE_URL: "postgresql+asyncpg://myle:myle@db:5432/myle"
      SECRET_KEY: "docker-compose-dev-secret-replace-in-real-deploy"
      AUTH_DEV_LOGIN_ENABLED: "true"
      CRM_API_URL: "http://crm-api:4000"
      CRM_INTERNAL_SECRET: "dev-internal-secret-change-in-prod"
    depends_on:
      db:
        condition: service_healthy
      crm-api:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:8000"
    depends_on:
      - backend

volumes:
  postgres_data:
