# Render Blueprint — https://render.com/docs/blueprint-spec
# Dashboard: New → Blueprint → Connect this repo → Apply
# Ya existing Web Service me repo + branch verify karo.

services:
  - type: web
    name: myle-dashboard
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Optional: WEB_CONCURRENCY=2+ after upgrading instance RAM (gunicorn defaults to 1 worker on Render)
      # Render sets RENDER=true → Secure session cookies + HSTS + security headers
      # Optional: MYLE_AI_FEATURES=1 — enable sidebar AI Intelligence + Maya chat (off by default)
      # Optional: SESSION_COOKIE_SECURE=0 for local HTTP debugging only
      # Optional: SECURITY_HEADERS=0 to disable X-Frame-Options etc. (debug only)
      # Dashboard → Environment → add SECRET_KEY (random long string)
      - key: SECRET_KEY
        sync: false
      # SQLite persistence (optional): Render disk mount + DATABASE_PATH=/var/data/leads.db
      # - key: DATABASE_PATH
      #   value: /var/data/leads.db
