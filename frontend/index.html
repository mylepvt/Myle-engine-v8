<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('myle-ui-feedback')
          var dark = true
          if (raw) {
            var j = JSON.parse(raw)
            var st = j.state !== undefined ? j.state : j
            var th = st.theme || 'dark'
            if (th === 'transparent') {
              document.documentElement.classList.add('theme-transparent')
              dark = true
            } else {
              document.documentElement.classList.remove('theme-transparent')
              if (th === 'light') dark = false
              else if (th === 'system')
                dark = window.matchMedia('(prefers-color-scheme: dark)').matches
              else dark = true
            }
          }
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <!-- Viewport — fit + cap scale so taps don’t “zoom” the page (PWA shell). Inputs use ≥16px on touch to avoid iOS focus-zoom. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <!-- Early: installed PWA / iOS standalone — used by index.css to avoid dvh “dead band” at bottom -->
    <script>
      ;(function () {
        try {
          var dm =
            window.matchMedia &&
            window.matchMedia('(display-mode: standalone)').matches
          var fs =
            window.matchMedia &&
            window.matchMedia('(display-mode: fullscreen)').matches
          var ios = window.navigator.standalone === true
          if (dm || fs || ios) document.documentElement.classList.add('pwa-standalone')
        } catch (e) {
          /* ignore */
        }
      })()
    </script>

    <!-- Identity -->
    <title>Myle</title>
    <meta name="description" content="Myle — your sales pipeline, follow-ups, and team leads in one place." />
    <meta name="application-name" content="Myle" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192.png" sizes="192x192" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS PWA shell -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Myle" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#050208" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Myle" />
    <meta property="og:description" content="Your sales pipeline, follow-ups, and team leads in one place." />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Myle" />

    <!-- Inter — matches tailwind fontFamily.sans (shadcn / v0 export stack) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
